# Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Network topology
#   public  → nginx only (ports 80, 443)
#   internal → api, web, postgres, redis (never exposed to host)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

x-restart-policy: &restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # no outbound internet access for DB / cache containers

volumes:
  postgres_data:
  redis_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *default-logging]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus:   '1.0'
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: [*restart, *default-logging]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename appendonly.aof
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 256M

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX}/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    <<: [*restart, *default-logging]
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET:   ${JWT_SECRET}
      CORS_ORIGIN:  ${CORS_ORIGIN}
      API_PORT:     3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # Prisma migrate on every startup (idempotent); then run the server
    command: >
      sh -c "
        npx prisma migrate deploy --schema apps/api/prisma/schema.prisma &&
        node apps/api/dist/main.js
      "
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health || exit 1']
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus:   '1.0'
          memory: 512M

  # ── Next.js Web ─────────────────────────────────────────────────────────────
  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX}/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_WS_URL:          ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_API_URL:         ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_DEMO_BRANCH_ID:  ${NEXT_PUBLIC_DEMO_BRANCH_ID:-}
        NEXT_PUBLIC_MOCK_MODE:       'false'
    <<: [*restart, *default-logging]
    environment:
      NODE_ENV: production
      PORT:     3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus:   '1.0'
          memory: 512M

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    <<: [*restart, *default-logging]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # Mount TLS certs (Let's Encrypt / custom)
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
    depends_on:
      - web
      - api
    networks:
      - public
      - internal
    deploy:
      resources:
        limits:
          cpus:   '0.5'
          memory: 64M
