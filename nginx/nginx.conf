# ─────────────────────────────────────────────────────────────────────────────
# Nginx production reverse proxy
#
# Traffic routing:
#   /api/v1/*           → NestJS API (api:3001)
#   /socket.io/*        → NestJS WebSocket (api:3001)  — upgrade handled
#   everything else     → Next.js (web:3000)
#
# TLS:
#   HTTP  (port 80)  → permanent redirect to HTTPS
#   HTTPS (port 443) → TLS 1.2/1.3, HSTS, OCSP stapling
#
# Replace YOUR_DOMAIN with the real domain and mount certs at:
#   ./nginx/ssl/fullchain.pem
#   ./nginx/ssl/privkey.pem
#   ./nginx/dhparam.pem   (openssl dhparam -out nginx/dhparam.pem 2048)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m   rate=60r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream api_upstream {
        server api:3001;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_dhparam         /etc/nginx/dhparam.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff    always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Connection limits ─────────────────────────────────────────────────
        limit_conn conn_limit 20;

        # ── Client body ───────────────────────────────────────────────────────
        client_max_body_size 10M;

        # ── NestJS API routes ─────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';   # keepalive to upstream
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Socket.IO WebSocket ───────────────────────────────────────────────
        # Socket.IO uses the /socket.io path by default.
        location /socket.io/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 3600s;   # keep WS alive for 1 hour
            proxy_send_timeout 3600s;
        }

        # ── Next.js static assets (long cache) ───────────────────────────────
        location /_next/static/ {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            # Next.js content-hashes filenames → immutable cache
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ── Next.js image optimisation endpoint ──────────────────────────────
        location /_next/image {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── All other traffic → Next.js ───────────────────────────────────────
        location / {
            limit_req zone=web_limit burst=100 nodelay;

            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_read_timeout 30s;
        }
    }
}
