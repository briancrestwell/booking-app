# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Build → Push → Deploy
#
# Trigger: push to `main` branch
#
# Required GitHub Secrets:
#   (For GHCR push we use the default GITHUB_TOKEN — no REGISTRY_TOKEN needed.)
#   VPS_HOST                  — VPS IP or hostname
#   VPS_USER                  — SSH user (e.g. "deploy")
#   VPS_SSH_KEY               — Private SSH key (PEM format)
#   VPS_APP_DIR               — Absolute path to app directory on VPS (e.g. /opt/booking-app)
#
#   # Production runtime secrets (forwarded to deploy.sh via .env.prod on VPS)
#   PROD_POSTGRES_USER
#   PROD_POSTGRES_PASSWORD
#   PROD_POSTGRES_DB
#   PROD_REDIS_PASSWORD
#   PROD_JWT_SECRET
#   PROD_CORS_ORIGIN
#   PROD_NEXT_PUBLIC_WS_URL
#   PROD_NEXT_PUBLIC_API_URL
#   PROD_NEXT_PUBLIC_DEMO_BRANCH_ID   (optional)
# ─────────────────────────────────────────────────────────────────────────────

name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual runs

env:
  REGISTRY:     ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/booking-app

jobs:
  # ── 1. Lint & type-check ───────────────────────────────────────────────────
  check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (API)
        run: cd apps/api && npx prisma generate

      - name: Type check — shared
        run: cd packages/shared && npx tsc --noEmit

      - name: Type check — web
        run: cd apps/web && npx tsc --noEmit

      - name: Type check — api
        run: cd apps/api && npx tsc --noEmit

  # ── 2. Build & push Docker images ─────────────────────────────────────────
  build:
    name: 🐳 Build Images
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── API image ──────────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/api/Dockerfile.prod
          push:       true
          tags:       ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false

      # ── Web image ──────────────────────────────────────────────────────────
      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/web/Dockerfile.prod
          push:       true
          tags:       ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:latest
          build-args: |
            NEXT_PUBLIC_WS_URL=${{ secrets.PROD_NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DEMO_BRANCH_ID=${{ secrets.PROD_NEXT_PUBLIC_DEMO_BRANCH_ID }}
            NEXT_PUBLIC_MOCK_MODE=false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false

  # ── 3. Deploy to VPS ──────────────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production    # requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Copy only the files the VPS needs (compose + nginx + scripts)
      - name: Sync deployment files to VPS
        run: |
          rsync -avz --delete \
            docker-compose.prod.yml \
            nginx/ \
            docker/ \
            scripts/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/

      # Write .env.prod on the VPS (never committed to git)
      - name: Write .env.prod on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cat > ${{ secrets.VPS_APP_DIR }}/.env.prod << 'ENVEOF'
          REGISTRY=ghcr.io
          IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          COMPOSE_PROJECT_NAME=booking_prod

          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}

          REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}

          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          CORS_ORIGIN=${{ secrets.PROD_CORS_ORIGIN }}
          API_PORT=3001

          NEXT_PUBLIC_WS_URL=${{ secrets.PROD_NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_API_URL=${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DEMO_BRANCH_ID=${{ secrets.PROD_NEXT_PUBLIC_DEMO_BRANCH_ID }}
          NEXT_PUBLIC_MOCK_MODE=false
          ENVEOF
          "

      - name: Pull images & deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && \
             export IMAGE_TAG=${{ needs.build.outputs.image_tag }} && \
             bash scripts/deploy.sh"

      - name: Deployment summary
        run: |
          echo "✅ Deployed tag: ${{ needs.build.outputs.image_tag }}"
          echo "🌐 URL: ${{ secrets.PROD_CORS_ORIGIN }}"
